spring:
  application:
    name: bifriends-be

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bifriends}
    username: ${DB_USERNAME:bifriends}
    password: ${DB_PASSWORD:bifriends}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

server:
  port: 8080
