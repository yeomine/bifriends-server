spring:
  application:
    name: bifriends-be

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bifriends}
    username: ${DB_USERNAME:bifriends}
    password: ${DB_PASSWORD:bifriends}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyMustBeAtLeast256Bits!!}
  access-token-expiration: 3600000    # 1시간
  refresh-token-expiration: 604800000 # 7일

firebase:
  config:
    path: ${FIREBASE_CONFIG_PATH:classpath:firebase-service-account.json}